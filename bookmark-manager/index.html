<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f8;
      --surface: #ffffff;
      --surface-alt: #f9f9fb;
      --border: #e4e4ec;
      --text: #1a1a2e;
      --text-muted: #666;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f14;
        --surface: #1a1a24;
        --surface-alt: #1f1f2e;
        --border: #2c2c40;
        --text: #e8e8f0;
        --text-muted: #9090b0;
        --accent: #7c6ff7;
        --accent-hover: #6c5ef7;
        --danger: #f87171;
        --danger-hover: #ef4444;
        --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 0.35rem;
      font-size: 0.95rem;
    }

    /* Form card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.78rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-alt);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    input::placeholder { color: var(--text-muted); opacity: 0.6; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .bookmark-count {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 260px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--accent); }

    /* Bookmark list */
    #bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .bookmark-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      box-shadow: var(--shadow);
      transition: border-color 0.15s;
      animation: fadeIn 0.2s ease;
    }

    .bookmark-item:hover { border-color: var(--accent); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .favicon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .favicon img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .favicon-fallback {
      font-size: 1rem;
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
    }

    .bookmark-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-title a {
      color: var(--text);
      text-decoration: none;
    }

    .bookmark-title a:hover { color: var(--accent); }

    .bookmark-url {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.15rem;
    }

    .bookmark-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-delete {
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      border-radius: 7px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      padding: 0;
    }

    .btn-delete:hover {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fecaca;
    }

    @media (prefers-color-scheme: dark) {
      .btn-delete:hover {
        background: #2d1515;
        border-color: #5a2020;
      }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.35rem; color: var(--text); }
    .empty-state p  { font-size: 0.88rem; }

    .error-msg {
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 0.4rem;
      display: none;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Bookmarks</h1>
      <p>Save and organize your favorite links.</p>
    </header>

    <!-- Add bookmark form -->
    <div class="card">
      <h2>Add Bookmark</h2>
      <form id="bookmark-form" novalidate>
        <div class="form-row">
          <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="My favorite site" autocomplete="off">
            <span class="error-msg" id="title-error">Please enter a title.</span>
          </div>
          <div class="field">
            <label for="url">URL</label>
            <input type="url" id="url" placeholder="https://example.com" autocomplete="off">
            <span class="error-msg" id="url-error">Please enter a valid URL.</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Bookmark
        </button>
      </form>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <span class="bookmark-count" id="bookmark-count"></span>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search bookmarks…" autocomplete="off">
      </div>
    </div>

    <!-- Bookmark list -->
    <div id="bookmark-list"></div>
  </div>

  <script>
    const STORAGE_KEY = 'bookmarks';

    const form      = document.getElementById('bookmark-form');
    const titleInput = document.getElementById('title');
    const urlInput  = document.getElementById('url');
    const listEl    = document.getElementById('bookmark-list');
    const countEl   = document.getElementById('bookmark-count');
    const searchEl  = document.getElementById('search');

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(bookmarks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function hostname(url) {
      try { return new URL(url).hostname; } catch { return ''; }
    }

    function faviconUrl(url) {
      const host = hostname(url);
      return host ? `https://www.google.com/s2/favicons?domain=${host}&sz=32` : null;
    }

    function render(filter = '') {
      const bookmarks = load();
      const query = filter.trim().toLowerCase();
      const filtered = query
        ? bookmarks.filter(b => b.title.toLowerCase().includes(query) || b.url.toLowerCase().includes(query))
        : bookmarks;

      countEl.textContent = bookmarks.length === 0
        ? ''
        : `${filtered.length} of ${bookmarks.length} bookmark${bookmarks.length !== 1 ? 's' : ''}`;

      if (bookmarks.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔖</div>
            <h3>No bookmarks yet</h3>
            <p>Add your first bookmark using the form above.</p>
          </div>`;
        return;
      }

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h3>No results</h3>
            <p>No bookmarks match "<strong>${escHtml(filter)}</strong>".</p>
          </div>`;
        return;
      }

      listEl.innerHTML = filtered.map(b => {
        const fav = faviconUrl(b.url);
        const faviconHtml = fav
          ? `<img src="${fav}" alt="" onerror="this.parentElement.innerHTML='<span class=favicon-fallback>🔗</span>'">`
          : `<span class="favicon-fallback">🔗</span>`;
        return `
          <div class="bookmark-item" data-id="${b.id}">
            <div class="favicon">${faviconHtml}</div>
            <div class="bookmark-info">
              <div class="bookmark-title"><a href="${escHtml(b.url)}" target="_blank" rel="noopener noreferrer">${escHtml(b.title)}</a></div>
              <div class="bookmark-url">${escHtml(hostname(b.url))}</div>
            </div>
            <div class="bookmark-date">${formatDate(b.createdAt)}</div>
            <button class="btn-delete" data-id="${b.id}" aria-label="Delete ${escHtml(b.title)}" title="Delete">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>`;
      }).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }

    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('visible'));
    }

    function isValidUrl(str) {
      try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
      catch { return false; }
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      clearErrors();

      const title = titleInput.value.trim();
      let url = urlInput.value.trim();

      let valid = true;
      if (!title) { showError('title-error', 'Please enter a title.'); valid = false; }

      // Auto-prefix protocol if missing
      if (url && !url.startsWith('http')) url = 'https://' + url;
      if (!isValidUrl(url)) { showError('url-error', 'Please enter a valid URL (https://…).'); valid = false; }

      if (!valid) return;

      const bookmarks = load();
      bookmarks.unshift({ id: Date.now().toString(), title, url, createdAt: new Date().toISOString() });
      save(bookmarks);
      render(searchEl.value);

      titleInput.value = '';
      urlInput.value   = '';
      titleInput.focus();
    });

    listEl.addEventListener('click', e => {
      const btn = e.target.closest('.btn-delete');
      if (!btn) return;
      const id = btn.dataset.id;
      const bookmarks = load().filter(b => b.id !== id);
      save(bookmarks);
      render(searchEl.value);
    });

    searchEl.addEventListener('input', () => render(searchEl.value));

    // Initial render
    render();
  </script>

</body>
</html>
