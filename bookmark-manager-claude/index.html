<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3348;
      --accent: #5c7cfa;
      --accent-hover: #748bfb;
      --accent-dim: rgba(92, 124, 250, 0.15);
      --text: #e2e6f0;
      --text-muted: #7a82a0;
      --danger: #f03e3e;
      --danger-hover: #ff5555;
      --success: #40c057;
      --radius: 10px;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header svg { color: var(--accent); flex-shrink: 0; }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header span {
      margin-left: auto;
      font-size: 0.82rem;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 860px;
      margin: 0 auto 24px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 10px 13px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
      font-family: inherit;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(240, 62, 62, 0.15);
    }

    select option { background: var(--surface2); }

    .error-msg {
      font-size: 0.78rem;
      color: var(--danger);
      min-height: 1.1em;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      justify-content: center;
      margin-top: 6px;
      padding: 12px;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input {
      flex: 1;
      min-width: 160px;
    }

    .toolbar select { width: auto; min-width: 150px; }

    .count-badge {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .bookmarks-list {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .bookmark-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bookmark-item:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .favicon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .favicon img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .favicon-fallback {
      font-size: 15px;
    }

    .bookmark-info { flex: 1; min-width: 0; }

    .bookmark-title {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .bookmark-url {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-url a {
      color: inherit;
      text-decoration: none;
    }

    .bookmark-url a:hover { color: var(--accent); }

    .category-tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-delete {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      padding: 0;
    }

    .btn-delete:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(240, 62, 62, 0.08);
    }

    .empty-state {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
      padding: 56px 24px;
      color: var(--text-muted);
    }

    .empty-state svg { opacity: 0.25; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--success);
      color: #fff;
      padding: 11px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .category-tag { display: none; }
    }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
  </svg>
  <h1>Bookmark Manager</h1>
  <span id="total-count">0 bookmarks</span>
</header>

<!-- Add Form -->
<div class="card">
  <h2>Add Bookmark</h2>
  <form id="bookmark-form" novalidate>
    <div class="form-grid">
      <div class="form-group full">
        <label for="url">URL</label>
        <input type="url" id="url" placeholder="https://example.com" autocomplete="off" />
        <span class="error-msg" id="url-error"></span>
      </div>
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="My favourite site" maxlength="120" autocomplete="off" />
        <span class="error-msg" id="title-error"></span>
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="" disabled selected>Select a category…</option>
          <option>Arts &amp; Design</option>
          <option>Books &amp; Literature</option>
          <option>Business &amp; Career</option>
          <option>Developer Tools</option>
          <option>Education &amp; Learning</option>
          <option>Entertainment</option>
          <option>Finance &amp; Banking</option>
          <option>Food &amp; Recipes</option>
          <option>Forums &amp; Communities</option>
          <option>Gaming</option>
          <option>Government &amp; Politics</option>
          <option>Health &amp; Fitness</option>
          <option>Music</option>
          <option>News &amp; Media</option>
          <option>Photography</option>
          <option>Productivity</option>
          <option>Reference &amp; Tools</option>
          <option>Science &amp; Research</option>
          <option>Shopping</option>
          <option>Social Media</option>
          <option>Sports</option>
          <option>Technology</option>
          <option>Travel</option>
          <option>Video &amp; Movies</option>
          <option>Other</option>
        </select>
        <span class="error-msg" id="category-error"></span>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Bookmark
    </button>
  </form>
</div>

<!-- Filter/Search Toolbar -->
<div class="card">
  <div class="toolbar">
    <input type="search" id="search" placeholder="Search bookmarks…" />
    <select id="filter-category">
      <option value="">All categories</option>
    </select>
    <span class="count-badge" id="visible-count"></span>
  </div>
</div>

<!-- Bookmark List -->
<div class="bookmarks-list" id="bookmarks-list"></div>

<div class="empty-state" id="empty-state" style="display:none">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
  </svg>
  <p id="empty-msg">No bookmarks yet. Add your first one above!</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'bm_bookmarks_v1';

  // ── State ──────────────────────────────────────────────────────────────────
  let bookmarks = load();
  let searchQuery = '';
  let filterCat = '';

  // ── Persistence ────────────────────────────────────────────────────────────
  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
  }

  // ── Validation ─────────────────────────────────────────────────────────────
  function isValidUrl(raw) {
    const trimmed = raw.trim();
    if (!trimmed) return false;
    try {
      const u = new URL(trimmed);
      return u.protocol === 'http:' || u.protocol === 'https:';
    } catch { return false; }
  }

  // ── Favicon ────────────────────────────────────────────────────────────────
  function faviconUrl(url) {
    try {
      const { origin } = new URL(url);
      return `https://www.google.com/s2/favicons?sz=32&domain_url=${encodeURIComponent(origin)}`;
    } catch { return null; }
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function filtered() {
    const q = searchQuery.toLowerCase();
    return bookmarks.filter(b => {
      const matchCat = !filterCat || b.category === filterCat;
      const matchQ   = !q
        || b.title.toLowerCase().includes(q)
        || b.url.toLowerCase().includes(q)
        || b.category.toLowerCase().includes(q);
      return matchCat && matchQ;
    });
  }

  function render() {
    const list = document.getElementById('bookmarks-list');
    const empty = document.getElementById('empty-state');
    const emptyMsg = document.getElementById('empty-msg');
    const visCount = document.getElementById('visible-count');
    const totalCount = document.getElementById('total-count');
    const n = bookmarks.length;
    totalCount.textContent = `${n} bookmark${n !== 1 ? 's' : ''}`;

    const items = filtered();
    list.innerHTML = '';

    if (items.length === 0) {
      empty.style.display = '';
      emptyMsg.textContent = n === 0
        ? 'No bookmarks yet. Add your first one above!'
        : 'No bookmarks match your search.';
      visCount.textContent = '';
      return;
    }

    empty.style.display = 'none';
    visCount.textContent = items.length !== n ? `${items.length} of ${n}` : '';

    items.forEach(b => {
      const div = document.createElement('div');
      div.className = 'bookmark-item';
      div.dataset.id = b.id;

      const fav = faviconUrl(b.url);
      const displayUrl = b.url.replace(/^https?:\/\//, '').replace(/\/$/, '');

      div.innerHTML = `
        <div class="favicon">
          ${fav
            ? `<img src="${fav}" alt="" onerror="this.parentElement.innerHTML='<span class=favicon-fallback>🔖</span>'" />`
            : '<span class="favicon-fallback">🔖</span>'}
        </div>
        <div class="bookmark-info">
          <div class="bookmark-title">${escHtml(b.title)}</div>
          <div class="bookmark-url"><a href="${escHtml(b.url)}" target="_blank" rel="noopener noreferrer">${escHtml(displayUrl)}</a></div>
        </div>
        <span class="category-tag">${escHtml(b.category)}</span>
        <button class="btn-delete" title="Delete bookmark" data-id="${b.id}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      `;
      list.appendChild(div);
    });
  }

  function rebuildCategoryFilter() {
    const sel = document.getElementById('filter-category');
    const prev = sel.value;
    const cats = [...new Set(bookmarks.map(b => b.category))].sort();
    sel.innerHTML = '<option value="">All categories</option>';
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      sel.appendChild(opt);
    });
    if (cats.includes(prev)) sel.value = prev;
    else { sel.value = ''; filterCat = ''; }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Form ───────────────────────────────────────────────────────────────────
  document.getElementById('bookmark-form').addEventListener('submit', e => {
    e.preventDefault();
    const urlEl   = document.getElementById('url');
    const titleEl = document.getElementById('title');
    const catEl   = document.getElementById('category');

    let valid = true;

    // URL
    const urlVal = urlEl.value.trim();
    if (!urlVal) {
      setError('url', 'URL is required.');
      valid = false;
    } else if (!isValidUrl(urlVal)) {
      setError('url', 'Please enter a valid URL starting with http:// or https://');
      valid = false;
    } else {
      clearError('url');
    }

    // Title
    const titleVal = titleEl.value.trim();
    if (!titleVal) {
      setError('title', 'Title is required.');
      valid = false;
    } else {
      clearError('title');
    }

    // Category
    const catVal = catEl.value;
    if (!catVal) {
      setError('category', 'Please select a category.');
      valid = false;
    } else {
      clearError('category');
    }

    if (!valid) return;

    bookmarks.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      url: urlVal,
      title: titleVal,
      category: catVal,
      addedAt: Date.now(),
    });
    save();
    rebuildCategoryFilter();
    render();
    showToast('Bookmark added!');

    urlEl.value = '';
    titleEl.value = '';
    catEl.selectedIndex = 0;
    urlEl.focus();
  });

  // Live URL validation feedback
  document.getElementById('url').addEventListener('input', function () {
    if (this.value && !isValidUrl(this.value)) {
      this.classList.add('invalid');
    } else {
      this.classList.remove('invalid');
      clearError('url');
    }
  });

  function setError(field, msg) {
    document.getElementById(field + '-error').textContent = msg;
    document.getElementById(field).classList.add('invalid');
  }

  function clearError(field) {
    document.getElementById(field + '-error').textContent = '';
    document.getElementById(field).classList.remove('invalid');
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  document.getElementById('bookmarks-list').addEventListener('click', e => {
    const btn = e.target.closest('.btn-delete');
    if (!btn) return;
    const id = btn.dataset.id;
    bookmarks = bookmarks.filter(b => b.id !== id);
    save();
    rebuildCategoryFilter();
    render();
    showToast('Bookmark removed.');
  });

  // ── Search & Filter ────────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', function () {
    searchQuery = this.value;
    render();
  });

  document.getElementById('filter-category').addEventListener('change', function () {
    filterCat = this.value;
    render();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  rebuildCategoryFilter();
  render();
</script>
</body>
</html>
